version: "3.9"

services:
  mongo:
    image: mongo:7.0
    container_name: faltric-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: faltric
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: faltric-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: faltric-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      MONGODB_URI: mongodb://mongo:27017/faltric
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      AI_SERVICE_URL: http://ai-service:8000
      ENERGY_TOKEN_ADDRESS: ${ENERGY_TOKEN_ADDRESS:-}
      TRADE_ENGINE_ADDRESS: ${TRADE_ENGINE_ADDRESS:-}
      DEPLOYER_PRIVATE_KEY: ${DEPLOYER_PRIVATE_KEY:-}
      SEPOLIA_RPC_URL: ${SEPOLIA_RPC_URL:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: faltric-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
      REPORTS_DIR: /tmp/faltric_reports
    volumes:
      - ai_reports:/tmp/faltric_reports

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000/api}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-http://localhost:4000}
        VITE_MAPBOX_TOKEN: ${VITE_MAPBOX_TOKEN:-}
        VITE_TOKEN_ADDRESS: ${VITE_TOKEN_ADDRESS:-}
        VITE_TRADE_ENGINE_ADDRESS: ${VITE_TRADE_ENGINE_ADDRESS:-}
    container_name: faltric-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo_data:
  redis_data:
  ai_reports:
